<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>When Things Go to Seat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="topbar">
    <span id="topbar-title">When Things Go to Seat</span>
    <button id="btn-start-tour" title="Start guided tour">Tour</button>

    <div id="sim-controls">
      <button id="btn-toggle-simulation" class="control-btn" title="Pause simulation">Pause</button>
      <button id="btn-reset-view" class="control-btn control-btn--ghost" title="Reset map view">View</button>
      <button id="btn-reset-demo" class="control-btn control-btn--ghost" title="Reset demo">Reset</button>
      <div id="speed-controls">
        <button class="speed-btn speed-btn--active" data-speed="1">1×</button>
        <button class="speed-btn" data-speed="2">2×</button>
        <button class="speed-btn" data-speed="4">4×</button>
      </div>
      <span id="clock">00:00</span>
    </div>
  </div>

  <!-- Floating walk-in button -->
  <button id="btn-walkin" title="Seat a walk-in guest">+ Walk-in</button>

  <div id="layout">

    <aside id="col-left">

      <!-- Sidebar icon strip -->
      <div id="sidebar-icons">
        <!-- Bookings (active) -->
        <button class="sidebar-icon sidebar-icon--active" title="Bookings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"></path>
          </svg>
          <span class="sidebar-icon-label">Bookings</span>
        </button>

        <!-- Floor Plan -->
        <button class="sidebar-icon" title="Floor Plan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
            <line x1="9.5" y1="3.5" x2="14.5" y2="3.5"></line>
            <line x1="9.5" y1="20.5" x2="14.5" y2="20.5"></line>
            <line x1="3.5" y1="9.5" x2="3.5" y2="14.5"></line>
            <line x1="20.5" y1="9.5" x2="20.5" y2="14.5"></line>
          </svg>
          <span class="sidebar-icon-label">Floor Plan</span>
        </button>

        <!-- Reservation -->
        <button class="sidebar-icon" title="Reservation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="15" y2="15"></line>
          </svg>
          <span class="sidebar-icon-label">Reservation</span>
        </button>

        <!-- Private Line -->
        <button class="sidebar-icon" title="Private Line">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            <circle cx="12" cy="16" r="1.5"></circle>
          </svg>
          <span class="sidebar-icon-label">Private</span>
        </button>

        <!-- Waitlist -->
        <button class="sidebar-icon" title="Waitlist">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
            <path d="M17 4.5L19 7l-2 2.5"></path>
            <path d="M7 4.5L5 7l2 2.5"></path>
          </svg>
          <span class="sidebar-icon-label">Waitlist</span>
        </button>

        <!-- Request -->
        <button class="sidebar-icon" title="Request">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            <path d="M8 10h.01"></path>
            <path d="M12 10h.01"></path>
            <path d="M16 10h.01"></path>
          </svg>
          <span class="sidebar-icon-label">Request</span>
        </button>

        <!-- Flows -->
        <button class="sidebar-icon" title="Flows">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <path d="M2 12h4l3-3 3 3 3-3 3 3h4"></path>
            <path d="M2 18h4l3-3 3 3 3-3 3 3h4"></path>
            <path d="M2 6h4l3 3 3-3 3 3 3-3h4"></path>
          </svg>
          <span class="sidebar-icon-label">Flows</span>
        </button>

        <!-- Guest List -->
        <button class="sidebar-icon" title="Guest List">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            <line x1="21" y1="11" x2="21" y2="15"></line>
            <line x1="23" y1="13" x2="19" y2="13"></line>
          </svg>
          <span class="sidebar-icon-label">Guests</span>
        </button>

        <!-- Settings -->
        <button class="sidebar-icon" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          <span class="sidebar-icon-label">Settings</span>
        </button>

        <!-- Grid -->
        <button class="sidebar-icon" title="Grid">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
          </svg>
          <span class="sidebar-icon-label">Grid</span>
        </button>

        <!-- Servers -->
        <button class="sidebar-icon" title="Servers">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
            <line x1="6" y1="6" x2="6.01" y2="6"></line>
            <line x1="6" y1="18" x2="6.01" y2="18"></line>
            <line x1="10" y1="6" x2="18" y2="6"></line>
            <line x1="10" y1="18" x2="18" y2="18"></line>
          </svg>
          <span class="sidebar-icon-label">Servers</span>
        </button>

        <div class="sidebar-spacer"></div>

        <!-- Help -->
        <button class="sidebar-icon" title="Help">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" focusable="false">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <span class="sidebar-icon-label">Help</span>
        </button>
      </div>

      <!-- Booking panel -->
      <div id="booking-panel">
        <div id="booking-panel-header">
          <div id="bp-search">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" placeholder="Guest or table" autocomplete="off" />
          </div>
        </div>
        <div id="booking-sections">
          <div class="booking-section" id="section-arrived">
            <div class="booking-section-header" data-section="arrived">
              <div class="booking-section-header-left">
                <span class="booking-section-title">ARRIVED</span>
              </div>
              <div class="booking-section-header-right">
                <span class="booking-section-count" id="count-arrived-badge"></span>
                <span class="booking-section-chevron">▾</span>
              </div>
            </div>
            <div class="booking-section-body" id="list-arrived"></div>
          </div>
          <div class="booking-section" id="section-upcoming">
            <div class="booking-section-header" data-section="upcoming">
              <div class="booking-section-header-left">
                <span class="booking-section-title">UPCOMING</span>
              </div>
              <div class="booking-section-header-right">
                <span class="booking-section-count" id="count-upcoming-badge"></span>
                <span class="booking-section-chevron">▾</span>
              </div>
            </div>
            <div class="booking-section-body" id="list-upcoming"></div>
          </div>
          <div class="booking-section booking-section--inactive">
            <div class="booking-section-header">
              <div class="booking-section-header-left">
                <span class="booking-section-title">SERVERS</span>
              </div>
              <span class="booking-section-chevron">▸</span>
            </div>
          </div>
          <div class="booking-section booking-section--inactive">
            <div class="booking-section-header">
              <div class="booking-section-header-left">
                <span class="booking-section-title">REQUESTS</span>
              </div>
              <span class="booking-section-chevron">▸</span>
            </div>
          </div>
          <div class="booking-section booking-section--inactive">
            <div class="booking-section-header">
              <div class="booking-section-header-left">
                <span class="booking-section-title">WAITING</span>
              </div>
              <span class="booking-section-chevron">▸</span>
            </div>
          </div>
        </div>
      </div>

    </aside>

      <div id="collapse-left" class="collapse-handle" title="Toggle booking panel">
        <span class="collapse-dots">⋮</span>
      </div>

  <!-- Guest profile modal -->
  <div id="guest-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Guest profile">
    <div id="guest-modal-inner">
      <div id="guest-modal-header">
        <div id="guest-modal-name-wrap">
          <span id="guest-modal-name"></span>
          <span id="guest-modal-booktype"></span>
        </div>
        <button id="guest-modal-close">✕</button>
      </div>
      <div id="guest-modal-body">
        <div class="guest-row">
          <span class="guest-label">Time</span>
          <span id="guest-modal-time"></span>
        </div>
        <div class="guest-row">
          <span class="guest-label">Covers</span>
          <span id="guest-modal-covers"></span>
        </div>
        <div class="guest-row">
          <span class="guest-label">Phone</span>
          <span id="guest-modal-phone"></span>
        </div>
        <div class="guest-row">
          <span class="guest-label">Email</span>
          <span id="guest-modal-email"></span>
        </div>
        <div class="guest-row" id="guest-modal-allergy-row">
          <span class="guest-label">Allergies</span>
          <span id="guest-modal-allergies"></span>
        </div>
        <div class="guest-row" id="guest-modal-notes-row">
          <span class="guest-label">Notes</span>
          <span id="guest-modal-notes"></span>
        </div>
        <div class="guest-row">
          <span class="guest-label">Tags</span>
          <div id="guest-modal-tags"></div>
        </div>
        <div class="guest-row">
          <span class="guest-label">Table</span>
          <span id="guest-modal-table"></span>
        </div>
      </div>
      <div id="guest-modal-actions">
        <button class="guest-action-btn guest-action-btn--primary" id="btn-seat">
          Seat Now
        </button>
        <button class="guest-action-btn" id="btn-assign">
          Assign Table
        </button>
        <button class="guest-action-btn" id="btn-no-show">
          No Show
        </button>
      </div>
    </div>
  </div>

  <!-- Conflict modal -->
  <div id="conflict-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Table conflict">
    <div id="conflict-modal-inner">
      <div id="conflict-modal-header">
        <span>Table Conflict</span>
        <button id="conflict-modal-close">✕</button>
      </div>
      <div id="conflict-modal-body">
        <p id="conflict-desc"></p>
        <div id="conflict-options">
          <button class="conflict-btn" id="btn-override">
            Seat here anyway — move current guests
          </button>
          <button class="conflict-btn" id="btn-pick-other">
            Choose a different table
          </button>
          <button class="conflict-btn conflict-btn--cancel" id="btn-conflict-cancel">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Large party warning modal -->
  <div id="party-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Table too small">
    <div id="party-modal-inner">
      <div id="party-modal-header">
        <span>Table Too Small</span>
        <button id="party-modal-close">✕</button>
      </div>
      <div id="party-modal-body">
        <p id="party-modal-desc"></p>
        <div id="party-modal-options">
          <button class="conflict-btn" id="btn-party-larger">Choose a larger table</button>
          <button class="conflict-btn" id="btn-party-anyway">Seat here anyway</button>
          <button class="conflict-btn conflict-btn--cancel" id="btn-party-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Table picker modal -->
  <div id="table-picker-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Select a table">
    <div id="table-picker-inner">
      <div id="table-picker-header">
        <span>Select a Table</span>
        <button id="table-picker-close">✕</button>
      </div>
      <div id="table-picker-body">
        <p id="table-picker-desc"></p>
        <div id="table-picker-list"></div>
      </div>
    </div>
  </div>

  <!-- Walk-in cover picker -->
  <div id="walkin-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Walk-in guest">
    <div id="walkin-inner">
      <div id="walkin-header">
        <span>Walk-in — How many guests?</span>
        <button id="walkin-close">✕</button>
      </div>
      <div id="walkin-body">
        <div id="walkin-covers-grid"></div>
      </div>
    </div>
  </div>

  <!-- Table options modal (click on non-occupied table) -->
  <div id="table-options-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Table options">
    <div id="table-options-inner">
      <div id="table-options-header">
        <span id="table-options-title"></span>
        <button id="table-options-close">✕</button>
      </div>
      <div id="table-options-body">
        <div id="table-options-list"></div>
      </div>
    </div>
  </div>

  <!-- Suggestion modal -->
  <div id="suggest-modal" class="modal-hidden" role="dialog" aria-modal="true" aria-label="Suggested table">
    <div id="suggest-modal-inner">
      <div id="suggest-modal-header">
        <span>Suggested Table</span>
        <button id="suggest-modal-close">✕</button>
      </div>
      <div id="suggest-modal-body">
        <div id="suggest-modal-desc"></div>
        <div id="suggest-modal-warning" class="modal-hidden"></div>
      </div>
      <div id="suggest-modal-actions">
        <button class="guest-action-btn guest-action-btn--primary" id="btn-suggest-seat">Seat Here</button>
        <button class="guest-action-btn" id="btn-suggest-other">See Other Tables</button>
        <button class="guest-action-btn" id="btn-suggest-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Guided tour overlay + popup -->
  <div id="tour-overlay" class="tour-hidden"></div>
  <div id="tour-popup" class="tour-hidden">
    <div id="tour-popup-header">
      <span id="tour-step-counter"></span>
      <button id="tour-exit">✕ Exit</button>
    </div>
    <div id="tour-popup-body"></div>
    <div id="tour-popup-footer">
      <button id="tour-prev">← Prev</button>
      <button id="tour-next">Next →</button>
    </div>
    <div id="tour-arrow"></div>
  </div>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
